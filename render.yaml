services:
  - type: web
    name: newsproject
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r newsproject/requirements.txt &&
      python newsproject/manage.py collectstatic --noinput &&
      python newsproject/manage.py migrate
    startCommand: gunicorn newsproject.newsproject.wsgi:application --bind 0.0.0.0:$PORT --chdir newsproject
    autoDeploy: true
    
    # Environment Variables
    envVars:
      - key: SECRET_KEY
        scope: run
        value: django-insecure-render-deployment-key-change-in-production
      - key: DEBUG
        scope: run
        value: "False"
      - key: ALLOWED_HOSTS
        scope: run
        value: "*.onrender.com,127.0.0.1"
      - key: DATABASE_URL
        scope: run
        fromDatabase:
          name: newsproject_db
          property: connectionString
      
  - type: pserv
    name: newsproject_db
    env: postgres
    region: oregon
    plan: free
    ipAllowList: []

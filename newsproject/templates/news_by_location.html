<!DOCTYPE html>
<html>
<head>
    <title>News by Location</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .filters { margin-bottom: 30px; }
        select { padding: 10px; margin-right: 10px; }
        button { padding: 10px 20px; background: #e74c3c; color: white; border: none; cursor: pointer; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .loading { text-align: center; padding: 20px; }
        .error { color: red; padding: 10px; background: #ffe6e6; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>News by Location</h1>
        
        <div class="filters">
            <select id="stateSelect">
                <option value="">Select State</option>
            </select>
            
            <select id="districtSelect">
                <option value="">Select District</option>
            </select>
            
            <button onclick="fetchNews()">Search</button>
        </div>
        
        <div id="message"></div>
        <div id="newsContainer" class="news-grid"></div>
    </div>

    <script>
        // Load states on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadStates();
            
            // Load districts when state changes
            document.getElementById('stateSelect').addEventListener('change', loadDistricts);
        });

        function loadStates() {
            fetch('/api/states/')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('stateSelect');
                    data.data.forEach(state => {
                        const option = document.createElement('option');
                        option.value = state.name;
                        option.textContent = state.name;
                        select.appendChild(option);
                    });
                })
                .catch(error => showError('Error loading states: ' + error));
        }

        function loadDistricts() {
            const state = document.getElementById('stateSelect').value;
            const select = document.getElementById('districtSelect');
            
            // Clear districts
            select.innerHTML = '<option value="">Select District</option>';
            
            if (!state) return;
            
            fetch(`/api/districts/?state=${state}`)
                .then(response => response.json())
                .then(data => {
                    data.data.forEach(district => {
                        const option = document.createElement('option');
                        option.value = district.name;
                        option.textContent = district.name;
                        select.appendChild(option);
                    });
                })
                .catch(error => showError('Error loading districts: ' + error));
        }

        function fetchNews() {
            const state = document.getElementById('stateSelect').value;
            const district = document.getElementById('districtSelect').value;
            const container = document.getElementById('newsContainer');
            const message = document.getElementById('message');
            
            container.innerHTML = '<div class="loading">Loading...</div>';
            message.innerHTML = '';
            
            let url = '/api/news/';
            
            if (district) {
                url += `district/?district=${district}&state=${state}`;
            } else if (state) {
                url += `state/?state=${state}`;
            } else {
                message.innerHTML = '<p class="error">Please select a state or district</p>';
                container.innerHTML = '';
                return;
            }
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.data && data.data.length > 0) {
                        container.innerHTML = data.data.map(article => `
                            <div class="news-card">
                                ${article.image ? `<img src="${article.image}" alt="news">` : ''}
                                <h3>${article.title}</h3>
                                <p>${article.description.substring(0, 100)}...</p>
                                <small>${new Date(article.created_at).toLocaleDateString()}</small>
                                <br><br>
                                <a href="/article/${article.slug}/" style="color: #e74c3c; text-decoration: none;">Read More →</a>
                            </div>
                        `).join('');
                        message.innerHTML = `<p>Found ${data.count} articles</p>`;
                    } else {
                        container.innerHTML = '';
                        message.innerHTML = '<p class="error">No news found</p>';
                    }
                })
                .catch(error => showError('Error fetching news: ' + error));
        }

        function showError(errorMsg) {
            document.getElementById('message').innerHTML = `<p class="error">${errorMsg}</p>`;
            document.getElementById('newsContainer').innerHTML = '';
        }
    </script>
</body>
</html>
